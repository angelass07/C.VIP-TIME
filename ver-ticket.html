<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>🎬 C.VIP TIME - Portal VIP</title>
    <style>
        * { box-sizing: border-box; }
        body { 
            background: linear-gradient(135deg, #0f0f0f 0%, #1a1a2e 50%, #16213e 100%); 
            color: white; font-family: 'Segoe UI', sans-serif; 
            display: flex; justify-content: center; align-items: center; 
            min-height: 100vh; margin: 0; padding: 20px;
        }
        .ticket { 
            background: rgba(26, 26, 44, 0.95); padding: 35px; border-radius: 24px; 
            width: 100%; max-width: 400px; border: 1px solid #333; 
            box-shadow: 0 25px 50px rgba(0,0,0,0.7); text-align: center; 
            backdrop-filter: blur(15px); position: relative; transition: all 0.5s ease;
        }
        /* Brillo VIP cuando está LISTO */
        .ticket.ready-glow { border-color: #27ae60; box-shadow: 0 0 40px rgba(39, 174, 96, 0.5); transform: scale(1.02); }
        .ticket::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 4px; background: linear-gradient(90deg, #f39c12, #e67e22); }
        .ticket.ready-glow::before { background: linear-gradient(90deg, #2ecc71, #27ae60); }
        
        h2 { color: #f39c12; margin-bottom: 25px; }
        input { width: 100%; padding: 15px; margin-bottom: 15px; border-radius: 12px; border: 2px solid #444; background: #222; color: #fff; }
        button { width: 100%; padding: 18px; border-radius: 12px; border: none; font-weight: bold; cursor: pointer; transition: 0.3s; background: linear-gradient(45deg, #f39c12, #e67e22); color: #000; text-transform: uppercase; }
        
        .info { margin-top: 25px; text-align: left; border-top: 1px solid #444; padding-top: 20px; display: none; }
        p { margin: 12px 0; color: #ccc; display: flex; justify-content: space-between; font-size: 14px; }
        span { color: #fff; font-weight: 600; }
        
        /* Estilos del Mensaje de Entrega */
        #mensajeEntrega {
            display: none; margin-top: 20px; padding: 15px; background: rgba(39, 174, 96, 0.2);
            border: 1px border; border-radius: 12px; color: #2ecc71; font-weight: 500;
            animation: fadeIn 1s ease; line-height: 1.4;
        }

        .status-badge { padding: 4px 10px; border-radius: 12px; font-size: 12px; font-weight: bold; }
        .waiting { background: #3498db33; color: #3498db; }
        .cooking { background: #f1c40f33; color: #f1c40f; }
        .ready { background: #27ae6033; color: #27ae60; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<div class="ticket" id="card">
    <h2>🎬 C.VIP TIME</h2>
    <input id="direccion" placeholder="Pega address del ticket">
    <button onclick="cargarTicket()">🔍 CONSULTAR TICKET</button>
    
    <div class="info" id="infoSection">
        <p>🎥 Película: <span id="peli"></span></p>
        <p>🎫 Asiento: <span id="asiento"></span></p>
        <p>🍿 Pedido: <span id="pedido"></span></p>
        <p>👨‍🍳 Staff: <span id="atendido"></span></p>
        <p>📍 Llegada: <span id="confirmado"></span></p>
        <p>📊 Estado: <span id="estado"></span></p>
        
        <div id="mensajeEntrega">
            🎉 <b>¡Buen provecho!</b><br>
            Su comida está lista y está siendo llevada por uno de nuestros empleados. ¡Disfrute  de la funcion y de su comida!
        </div>
    </div>
</div>

<script src="https://unpkg.com/@solana/web3.js@1.87.6/lib/index.iife.min.js"></script>

<script>
    const ESTADOS = [
        { texto: "⏳ En espera", clase: "waiting" },
        { texto: "🍳 En cocina", clase: "cooking" },
        { texto: "🎉 Listo", clase: "ready" }
    ];

    async function cargarTicket() {
        try {
            const address = document.getElementById("direccion").value.trim();
            if (!address) return;

            const connection = new solanaWeb3.Connection("https://api.devnet.solana.com", "confirmed");
            const account = await connection.getAccountInfo(new solanaWeb3.PublicKey(address));
            
            if (!account) return;
            const data = account.data;

            // Decodificación dinámica
            const leerS = (inicio) => {
                const len = data[inicio] | (data[inicio+1] << 8) | (data[inicio+2] << 16) | (data[inicio+3] << 24);
                return { v: new TextDecoder().decode(data.slice(inicio + 4, inicio + 4 + len)).replace(/\0/g, ''), s: inicio + 4 + len };
            };

            const r1 = leerS(8);  // Peli
            const r2 = leerS(r1.s); // Asiento
            const r3 = leerS(r2.s); // Pedido
            const r4 = leerS(r3.s); // Atendido por

            const confirmado = data[r4.s] === 1;
            const estado = data[r4.s + 1];

            // Llenar datos
            document.getElementById("peli").innerText = r1.v;
            document.getElementById("asiento").innerText = r2.v;
            document.getElementById("pedido").innerText = r3.v;
            document.getElementById("atendido").innerText = r4.v;
            document.getElementById("confirmado").innerText = confirmado ? "✅ En Sala" : "❌ No ha llegado";
            document.getElementById("estado").innerHTML = `<span class="status-badge ${ESTADOS[estado].clase}">${ESTADOS[estado].texto}</span>`;
            
            // pal MENSAJE  Y  el BRILLO
            const msj = document.getElementById("mensajeEntrega");
            const card = document.getElementById("card");

            if (estado === 2) {
                msj.style.display = "block";
                card.classList.add("ready-glow");
            } else {
                msj.style.display = "none";
                card.classList.remove("ready-glow");
            }

            document.getElementById("infoSection").style.display = "block";

            setTimeout(cargarTicket, 5000);

        } catch (e) { console.error(e); }
    }
</script>
</body>
</html>
